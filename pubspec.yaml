publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  mobile_scanner: ^5.2.3
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
